<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS — アカウント登録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0a0a0a;
  --bg2:     #131313;
  --bg3:     #1a1a1a;
  --border:  rgba(255,255,255,0.08);
  --borderH: rgba(255,255,255,0.18);
  --accent:  #1D9E75;
  --accent2: #5DCAA5;
  --adim:    rgba(29,158,117,0.14);
  --text:    #f0f0f0;
  --muted:   #888;
  --muted2:  #444;
  --danger:  #e24b4a;
  --mono:    'Space Mono', monospace;
  --sans:    'Noto Sans JP', sans-serif;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  height: 56px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--accent);
}
.logo span { color: var(--text); }
#nav-user {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--muted);
}
#nav-user .avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--adim);
  border: 1px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--accent2);
}
#nav-logout {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--sans);
  cursor: pointer;
  transition: all .15s;
}
#nav-logout:hover { border-color: var(--danger); color: var(--danger); }

/* ── MAIN LAYOUT ── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  position: relative;
}
.card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 17px;
  background: linear-gradient(135deg, rgba(29,158,117,0.25), transparent 50%);
  z-index: -1;
}
.card-logo {
  font-family: var(--mono);
  font-size: 22px;
  color: var(--accent);
  text-align: center;
  margin-bottom: 1.75rem;
  display: block;
}
.card-logo span { color: var(--text); }

/* TABS */
.tabs {
  display: flex;
  background: var(--bg3);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 1.75rem;
}
.tab-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
}
.tab-btn.active {
  background: var(--accent);
  color: #fff;
}

/* FORM */
.form-group { margin-bottom: 1rem; }
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}
input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted2); }
input.error { border-color: var(--danger); }

.password-wrap { position: relative; }
.toggle-pw {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 0;
}
.toggle-pw:hover { color: var(--text); }

/* STRENGTH BAR */
.strength-wrap { margin-top: 8px; }
.strength-bar {
  height: 3px;
  border-radius: 2px;
  background: var(--bg3);
  overflow: hidden;
  margin-bottom: 4px;
}
.strength-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width .3s, background .3s;
}
.strength-label { font-size: 11px; color: var(--muted); }

/* SUBMIT */
.btn-submit {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  padding: 13px;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: opacity .2s, transform .1s;
  position: relative;
}
.btn-submit:hover { opacity: .88; }
.btn-submit:active { transform: scale(.98); }
.btn-submit:disabled { opacity: .45; cursor: not-allowed; }
.btn-submit .spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* DIVIDER */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 1.25rem 0;
  font-size: 12px;
  color: var(--muted2);
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* OAUTH */
.btn-oauth {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: border-color .2s, background .2s;
  margin-bottom: 8px;
}
.btn-oauth:hover { border-color: var(--borderH); background: var(--bg3); }
.btn-oauth img { width: 18px; height: 18px; }

/* ALERT */
.alert {
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 1rem;
  display: none;
}
.alert.error { background: rgba(226,75,74,0.12); border: 1px solid rgba(226,75,74,0.3); color: #f09595; }
.alert.success { background: var(--adim); border: 1px solid rgba(29,158,117,0.3); color: var(--accent2); }
.alert.show { display: block; }

/* TERMS */
.terms {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  margin-top: 1rem;
  line-height: 1.6;
}
.terms a { color: var(--accent2); text-decoration: none; }

/* ── DASHBOARD ── */
#dashboard { display: none; width: 100%; max-width: 860px; padding-bottom: 4rem; }
.dash-greeting { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
.dash-greeting span { color: var(--accent); }
.dash-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }
.dash-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
.dash-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
.dash-card .dc-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.dash-card .dc-val { font-family: var(--mono); font-size: 26px; color: var(--accent); }
.plan-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--adim); border: 1px solid rgba(29,158,117,0.25); border-radius: 20px; padding: 4px 14px; font-size: 12px; color: var(--accent2); margin-bottom: 1.5rem; font-family: var(--mono); }
.plan-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* FEATURE TABS */
.feat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.feat-tab { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: var(--sans); transition: all .15s; white-space: nowrap; }
.feat-tab:hover { border-color: var(--borderH); color: var(--text); }
.feat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* FEATURE GRID */
.feat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-bottom: 2rem; }
.feat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
.feat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform .2s; }
.feat-card:hover { border-color: rgba(29,158,117,0.4); background: var(--bg3); transform: translateY(-1px); }
.feat-card:hover::before { transform: scaleX(1); }
.feat-card .fc-icon { font-size: 20px; margin-bottom: 8px; display: block; }
.feat-card .fc-name { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 3px; }
.feat-card .fc-desc { font-size: 11px; color: var(--muted); display: block; line-height: 1.5; }

/* MODAL */
.fmodal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; align-items: center; justify-content: center; padding: 1.5rem; }
.fmodal-overlay.open { display: flex; }
.fmodal { background: var(--bg2); border: 1px solid var(--borderH); border-radius: 16px; padding: 2rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; position: relative; animation: mIn .2s ease; }
@keyframes mIn { from { opacity:0; transform: scale(.95) translateY(8px); } to { opacity:1; transform: scale(1) translateY(0); } }
.fmodal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height:1; }
.fmodal-close:hover { color: var(--text); }
.fmodal-icon { font-size: 36px; margin-bottom: .75rem; display: block; }
.fmodal h3 { font-size: 18px; font-weight: 700; margin-bottom: .5rem; }
.fmodal .fmodal-hint { font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.6; }

/* AI INPUT AREA */
.ai-input-wrap { margin-bottom: 1rem; }
.ai-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; letter-spacing:.04em; }
.ai-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 13px; padding: 10px 12px; outline: none; resize: vertical; min-height: 90px; transition: border-color .2s; line-height: 1.6; }
.ai-textarea:focus { border-color: var(--accent); }
.ai-textarea::placeholder { color: var(--muted2); }
.ai-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 13px; padding: 10px 12px; outline: none; transition: border-color .2s; margin-bottom: 8px; }
.ai-input:focus { border-color: var(--accent); }
.ai-input::placeholder { color: var(--muted2); }
.ai-run { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 11px; cursor: pointer; margin-top: .5rem; transition: opacity .2s; }
.ai-run:hover { opacity: .85; }
.ai-run:disabled { opacity: .45; cursor: not-allowed; }

/* AI RESULT */
.ai-result { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap; margin-top: 1rem; min-height: 60px; display: none; position: relative; }
.ai-result.show { display: block; }
.ai-result-copy { position: absolute; top: 8px; right: 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 11px; color: var(--muted); cursor: pointer; transition: all .15s; }
.ai-result-copy:hover { color: var(--text); border-color: var(--borderH); }
.ai-thinking { color: var(--muted); font-style: italic; font-size: 12px; }

/* HISTORY */
.hist-section { margin-top: 1.5rem; }
.hist-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing:.04em; }
.hist-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 12px; color: var(--muted); cursor: pointer; transition: border-color .15s; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.hist-item:hover { border-color: var(--borderH); color: var(--text); }
.hist-item .hi-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-item .hi-time { font-size: 10px; flex-shrink: 0; color: var(--muted2); }

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 1rem 2rem;
  text-align: center;
  font-size: 12px;
  color: var(--muted2);
  flex-shrink: 0;
}
</style>
</head>
<body>

<nav>
  <div class="logo">Life<span>OS</span></div>
  <div id="nav-user" style="display:none">
    <div class="avatar" id="nav-avatar"></div>
    <span id="nav-email"></span>
    <button id="nav-logout" onclick="logout()">ログアウト</button>
  </div>
</nav>

<main>
  <!-- AUTH CARD -->
  <div class="card" id="auth-card">
    <span class="card-logo">Life<span>OS</span></span>

    <div class="tabs">
      <button class="tab-btn active" id="tab-signup" onclick="switchTab('signup')">新規登録</button>
      <button class="tab-btn" id="tab-login" onclick="switchTab('login')">ログイン</button>
    </div>

    <div class="alert error" id="alert-error"></div>
    <div class="alert success" id="alert-success"></div>

    <!-- SIGNUP FORM -->
    <form id="form-signup" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>表示名</label>
        <input type="text" id="signup-name" placeholder="山田 太郎" autocomplete="name">
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <div class="password-wrap">
          <input type="password" id="signup-password" placeholder="8文字以上" required autocomplete="new-password" oninput="checkStrength(this.value)">
          <button type="button" class="toggle-pw" onclick="togglePw('signup-password', this)">👁</button>
        </div>
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="strength-label" id="strength-label"></span>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btn-signup">アカウントを作成</button>

      <div class="divider">または</div>
      <button type="button" class="btn-oauth" onclick="oauthLogin('google')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleで続ける
      </button>

      <p class="terms">登録することで<a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意したものとみなします。</p>
    </form>

    <!-- LOGIN FORM -->
    <form id="form-login" style="display:none" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <div class="password-wrap">
          <input type="password" id="login-password" placeholder="パスワード" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)">👁</button>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:1rem">
        <a href="#" onclick="handleReset(event)" style="font-size:12px;color:var(--accent2);text-decoration:none">パスワードを忘れた方</a>
      </div>
      <button type="submit" class="btn-submit" id="btn-login">ログイン</button>

      <div class="divider">または</div>
      <button type="button" class="btn-oauth" onclick="oauthLogin('google')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleで続ける
      </button>
    </form>
  </div>

  <!-- DASHBOARD (ログイン後) -->
  <div id="dashboard">
    <div class="plan-badge"><span class="plan-dot"></span>FREE PLAN</div>
    <div class="dash-greeting">おかえり、<span id="dash-name">ユーザー</span>さん 👋</div>
    <p class="dash-sub" id="dash-email-sub"></p>
    <div class="dash-cards">
      <div class="dash-card"><div class="dc-label">利用可能な機能</div><div class="dc-val">50</div></div>
      <div class="dash-card"><div class="dc-label">今月の使用回数</div><div class="dc-val" id="dc-uses">0</div></div>
      <div class="dash-card"><div class="dc-label">プラン</div><div class="dc-val" style="font-size:18px;padding-top:4px">Free</div></div>
    </div>

    <div class="feat-tabs" id="featTabs"></div>
    <div class="feat-grid" id="featGrid"></div>
  </div>

  <!-- FEATURE MODAL -->
  <div class="fmodal-overlay" id="fmodal">
    <div class="fmodal">
      <button class="fmodal-close" onclick="closeFModal()">✕</button>
      <span class="fmodal-icon" id="fm-icon"></span>
      <h3 id="fm-name"></h3>
      <p class="fmodal-hint" id="fm-hint"></p>
      <div id="fm-body"></div>
      <div class="ai-result" id="fm-result">
        <button class="ai-result-copy" onclick="copyResult()">コピー</button>
        <span id="fm-result-text"></span>
      </div>
      <div class="hist-section" id="fm-hist" style="display:none">
        <div class="hist-title">最近の履歴</div>
        <div id="fm-hist-list"></div>
      </div>
    </div>
  </div>
</main>

<footer>© 2025 LifeOS Platform — <a href="#" style="color:var(--accent2);text-decoration:none">プライバシーポリシー</a></footer>

<script>
// ============================================================
// ⚠️  ここに自分のSupabaseプロジェクト情報を入れてください
// ============================================================
const SUPABASE_URL = 'https://gbgxqcmtyldpyqrkgxgu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_hwcJ2_kq_Ob1wIGV4rlUKg_FgDdbKKr';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── タブ切り替え ──
function switchTab(tab) {
  document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('form-login').style.display  = tab === 'login'  ? '' : 'none';
  document.getElementById('tab-signup').className = 'tab-btn' + (tab === 'signup' ? ' active' : '');
  document.getElementById('tab-login').className  = 'tab-btn' + (tab === 'login'  ? ' active' : '');
  clearAlerts();
}

// ── アラート ──
function showAlert(type, msg) {
  clearAlerts();
  const el = document.getElementById('alert-' + type);
  el.textContent = msg;
  el.classList.add('show');
}
function clearAlerts() {
  ['alert-error','alert-success'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('show');
    el.textContent = '';
  });
}

// ── パスワード表示切り替え ──
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// ── パスワード強度チェック ──
function checkStrength(val) {
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (val.length >= 8)  score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w: '0%',   bg: 'transparent', text: '' },
    { w: '25%',  bg: '#e24b4a',     text: '弱い' },
    { w: '50%',  bg: '#EF9F27',     text: 'まあまあ' },
    { w: '75%',  bg: '#1D9E75',     text: '強い' },
    { w: '100%', bg: '#5DCAA5',     text: 'とても強い' },
  ];
  const l = levels[score];
  fill.style.width      = l.w;
  fill.style.background = l.bg;
  label.textContent     = l.text;
  label.style.color     = l.bg;
}

// ── ボタンのローディング状態 ──
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span>処理中...'
    : (btnId === 'btn-signup' ? 'アカウントを作成' : 'ログイン');
}

// ── 新規登録 ──
async function handleSignup(e) {
  e.preventDefault();
  clearAlerts();
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-password').value;

  if (pass.length < 8) { showAlert('error', 'パスワードは8文字以上で入力してください'); return; }

  setLoading('btn-signup', true);
  const { data, error } = await sb.auth.signUp({
    email,
    password: pass,
    options: { data: { display_name: name || email.split('@')[0] } }
  });
  setLoading('btn-signup', false);

  if (error) {
    const msg = {
      'User already registered': 'このメールアドレスはすでに登録されています',
      'Password should be at least 6 characters': 'パスワードは6文字以上で入力してください',
    }[error.message] || error.message;
    showAlert('error', msg);
  } else if (data.user?.identities?.length === 0) {
    showAlert('error', 'このメールアドレスはすでに登録されています');
  } else {
    showAlert('success', '✅ 確認メールを送りました。メールボックスをご確認ください。');
  }
}

// ── ログイン ──
async function handleLogin(e) {
  e.preventDefault();
  clearAlerts();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;

  setLoading('btn-login', true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoading('btn-login', false);

  if (error) {
    const msg = {
      'Invalid login credentials': 'メールアドレスまたはパスワードが正しくありません',
      'Email not confirmed': 'メールアドレスの確認が完了していません。確認メールをご確認ください',
    }[error.message] || error.message;
    showAlert('error', msg);
  } else {
    showDashboard(data.user);
  }
}

// ── Google OAuth ──
async function oauthLogin(provider) {
  const { error } = await sb.auth.signInWithOAuth({
    provider,
    options: { redirectTo: window.location.href }
  });
  if (error) showAlert('error', error.message);
}

// ── パスワードリセット ──
async function handleReset(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showAlert('error', 'メールアドレスを入力してから押してください'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.href
  });
  if (error) showAlert('error', error.message);
  else showAlert('success', 'パスワードリセットのメールを送りました');
}

// ── ログアウト ──
async function logout() {
  await sb.auth.signOut();
  showAuthCard();
}

// ── UI 切り替え ──
function showDashboard(user) {
  const name = user.user_metadata?.display_name || user.email.split('@')[0];
  document.getElementById('dash-name').textContent = name;
  document.getElementById('dash-email-sub').textContent = user.email + ' でログイン中';
  document.getElementById('nav-avatar').textContent = name[0].toUpperCase();
  document.getElementById('nav-email').textContent = user.email;
  document.getElementById('nav-user').style.display = 'flex';
  document.getElementById('auth-card').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderFeatTabs();
  renderFeatGrid();
}

function showAuthCard() {
  document.getElementById('nav-user').style.display = 'none';
  document.getElementById('auth-card').style.display = '';
  document.getElementById('dashboard').style.display = 'none';
  clearAlerts();
}

// ── セッション復元 ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showDashboard(session.user);
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) showDashboard(session.user);
    if (event === 'SIGNED_OUT') showAuthCard();
  });
  // メール確認リンクからのトークン処理
  if (window.location.hash.includes('access_token')) {
    const { data: { session } } = await sb.auth.getSession();
    if (session) showDashboard(session.user);
  }
})();

];

let currentCat = 'all';
let useCount = parseInt(localStorage.getItem('lifeos_uses') || '0');
const history = JSON.parse(localStorage.getItem('lifeos_hist') || '[]');

function renderFeatTabs() {
  document.getElementById('featTabs').innerHTML = CATS.map(c =>
    `<button class="feat-tab${c.id===currentCat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function renderFeatGrid() {
  const items = currentCat === 'all' ? FEATURES : FEATURES.filter(f => f.cat === currentCat);
  document.getElementById('featGrid').innerHTML = items.map(f => `
    <div class="feat-card" onclick="openFModal('${f.id}')">
      <span class="fc-icon">${f.icon}</span>
      <span class="fc-name">${f.name}</span>
      <span class="fc-desc">${f.desc}</span>
    </div>
  `).join('');
}

function setCat(id) {
  currentCat = id;
  renderFeatTabs();
  renderFeatGrid();
}

// ── モーダル ──
let currentFeature = null;

function openFModal(id) {
  const f = FEATURES.find(x => x.id === id);
  if (!f) return;
  currentFeature = f;
  document.getElementById('fm-icon').textContent = f.icon;
  document.getElementById('fm-name').textContent = f.name;
  document.getElementById('fm-hint').textContent = f.hint;

  // 入力フォームを生成
  document.getElementById('fm-body').innerHTML = f.inputs.map(inp => `
    <div class="ai-input-wrap">
      <span class="ai-label">${inp.label}</span>
      ${inp.type === 'textarea'
        ? `<textarea class="ai-textarea" id="fi-${inp.id}" placeholder="${inp.placeholder}"></textarea>`
        : `<input class="ai-input" id="fi-${inp.id}" type="text" placeholder="${inp.placeholder}">`
      }
    </div>
  `).join('') + `<button class="ai-run" id="fm-run" onclick="runFeature()">✨ AIで実行</button>`;

  // 結果リセット
  const res = document.getElementById('fm-result');
  res.classList.remove('show');
  document.getElementById('fm-result-text').textContent = '';

  // 履歴表示
  const featHist = history.filter(h => h.id === id).slice(-3).reverse();
  const histEl = document.getElementById('fm-hist');
  const histList = document.getElementById('fm-hist-list');
  if (featHist.length > 0) {
    histList.innerHTML = featHist.map(h => `
      <div class="hist-item" onclick="loadHist('${h.id}', ${history.indexOf(h)})">
        <span class="hi-text">${h.input}</span>
        <span class="hi-time">${h.time}</span>
      </div>
    `).join('');
    histEl.style.display = 'block';
  } else {
    histEl.style.display = 'none';
  }

  document.getElementById('fmodal').classList.add('open');
}

function closeFModal() {
  document.getElementById('fmodal').classList.remove('open');
}
document.getElementById('fmodal').addEventListener('click', e => {
  if (e.target === document.getElementById('fmodal')) closeFModal();
});

async function runFeature() {
  if (!currentFeature) return;
  const vals = {};
  for (const inp of currentFeature.inputs) {
    vals[inp.id] = (document.getElementById('fi-' + inp.id)?.value || '').trim();
  }
  const firstVal = Object.values(vals)[0];
  if (!firstVal) { alert('入力してください'); return; }

  const prompt = currentFeature.prompt(vals);
  const btn = document.getElementById('fm-run');
  btn.disabled = true;
  btn.textContent = '⏳ AIが考え中...';

  const resultEl = document.getElementById('fm-result');
  const resultText = document.getElementById('fm-result-text');
  resultText.innerHTML = '<span class="ai-thinking">AIが考えています...</span>';
  resultEl.classList.add('show');

  try {
    const res = await fetch('https://gbgxqcmtyldpyqrkgxgu.supabase.co/functions/v1/claude-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const answer = data.content?.[0]?.text || 'エラーが発生しました';
    resultText.textContent = answer;

    // 使用回数・履歴を更新
    useCount++;
    localStorage.setItem('lifeos_uses', useCount);
    document.getElementById('dc-uses').textContent = useCount;

    const now = new Date();
    const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    history.push({ id: currentFeature.id, input: firstVal.substring(0, 40), time: timeStr });
    if (history.length > 100) history.shift();
    localStorage.setItem('lifeos_hist', JSON.stringify(history));

  } catch (e) {
    resultText.textContent = 'エラーが発生しました: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '✨ AIで実行';
}

function copyResult() {
  const text = document.getElementById('fm-result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.ai-result-copy');
    btn.textContent = 'コピー済み✓';
    setTimeout(() => btn.textContent = 'コピー', 1500);
  });
}

function loadHist(id, idx) {
  // 履歴から結果を再表示（入力値のみ）
  const h = history[idx];
  if (!h) return;
  const resultText = document.getElementById('fm-result-text');
  resultText.textContent = '← 上の入力欄に同じ内容を入力して再実行してください（結果は保存していません）';
  document.getElementById('fm-result').classList.add('show');
}
</script>
</body>
