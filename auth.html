<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS — アカウント登録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0a0a0a;
  --bg2:     #131313;
  --bg3:     #1a1a1a;
  --border:  rgba(255,255,255,0.08);
  --borderH: rgba(255,255,255,0.18);
  --accent:  #1D9E75;
  --accent2: #5DCAA5;
  --adim:    rgba(29,158,117,0.14);
  --text:    #f0f0f0;
  --muted:   #888;
  --muted2:  #444;
  --danger:  #e24b4a;
  --mono:    'Space Mono', monospace;
  --sans:    'Noto Sans JP', sans-serif;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  height: 56px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--accent);
}
.logo span { color: var(--text); }
#nav-user {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--muted);
}
#nav-user .avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--adim);
  border: 1px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--accent2);
}
#nav-logout {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--sans);
  cursor: pointer;
  transition: all .15s;
}
#nav-logout:hover { border-color: var(--danger); color: var(--danger); }

/* ── MAIN LAYOUT ── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  position: relative;
}
.card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 17px;
  background: linear-gradient(135deg, rgba(29,158,117,0.25), transparent 50%);
  z-index: -1;
}
.card-logo {
  font-family: var(--mono);
  font-size: 22px;
  color: var(--accent);
  text-align: center;
  margin-bottom: 1.75rem;
  display: block;
}
.card-logo span { color: var(--text); }

/* TABS */
.tabs {
  display: flex;
  background: var(--bg3);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 1.75rem;
}
.tab-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
}
.tab-btn.active {
  background: var(--accent);
  color: #fff;
}

/* FORM */
.form-group { margin-bottom: 1rem; }
label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}
input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted2); }
input.error { border-color: var(--danger); }

.password-wrap { position: relative; }
.toggle-pw {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 0;
}
.toggle-pw:hover { color: var(--text); }

/* STRENGTH BAR */
.strength-wrap { margin-top: 8px; }
.strength-bar {
  height: 3px;
  border-radius: 2px;
  background: var(--bg3);
  overflow: hidden;
  margin-bottom: 4px;
}
.strength-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width .3s, background .3s;
}
.strength-label { font-size: 11px; color: var(--muted); }

/* SUBMIT */
.btn-submit {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  padding: 13px;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: opacity .2s, transform .1s;
  position: relative;
}
.btn-submit:hover { opacity: .88; }
.btn-submit:active { transform: scale(.98); }
.btn-submit:disabled { opacity: .45; cursor: not-allowed; }
.btn-submit .spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* DIVIDER */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 1.25rem 0;
  font-size: 12px;
  color: var(--muted2);
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* OAUTH */
.btn-oauth {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: border-color .2s, background .2s;
  margin-bottom: 8px;
}
.btn-oauth:hover { border-color: var(--borderH); background: var(--bg3); }
.btn-oauth img { width: 18px; height: 18px; }

/* ALERT */
.alert {
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 1rem;
  display: none;
}
.alert.error { background: rgba(226,75,74,0.12); border: 1px solid rgba(226,75,74,0.3); color: #f09595; }
.alert.success { background: var(--adim); border: 1px solid rgba(29,158,117,0.3); color: var(--accent2); }
.alert.show { display: block; }

/* TERMS */
.terms {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  margin-top: 1rem;
  line-height: 1.6;
}
.terms a { color: var(--accent2); text-decoration: none; }

/* ── DASHBOARD ── */
#dashboard { display: none; width: 100%; max-width: 680px; }
.dash-greeting {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.25rem;
}
.dash-greeting span { color: var(--accent); }
.dash-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }

.dash-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 2rem;
}
.dash-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
}
.dash-card .dc-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.dash-card .dc-val {
  font-family: var(--mono);
  font-size: 26px;
  color: var(--accent);
}

.plan-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--adim);
  border: 1px solid rgba(29,158,117,0.25);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 12px;
  color: var(--accent2);
  margin-bottom: 1.5rem;
  font-family: var(--mono);
}
.plan-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.feat-preview {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.feat-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.feat-row span:first-child { font-size: 18px; }

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 1rem 2rem;
  text-align: center;
  font-size: 12px;
  color: var(--muted2);
  flex-shrink: 0;
}
</style>
</head>
<body>

<nav>
  <div class="logo">Life<span>OS</span></div>
  <div id="nav-user" style="display:none">
    <div class="avatar" id="nav-avatar"></div>
    <span id="nav-email"></span>
    <button id="nav-logout" onclick="logout()">ログアウト</button>
  </div>
</nav>

<main>
  <!-- AUTH CARD -->
  <div class="card" id="auth-card">
    <span class="card-logo">Life<span>OS</span></span>

    <div class="tabs">
      <button class="tab-btn active" id="tab-signup" onclick="switchTab('signup')">新規登録</button>
      <button class="tab-btn" id="tab-login" onclick="switchTab('login')">ログイン</button>
    </div>

    <div class="alert error" id="alert-error"></div>
    <div class="alert success" id="alert-success"></div>

    <!-- SIGNUP FORM -->
    <form id="form-signup" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>表示名</label>
        <input type="text" id="signup-name" placeholder="山田 太郎" autocomplete="name">
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <div class="password-wrap">
          <input type="password" id="signup-password" placeholder="8文字以上" required autocomplete="new-password" oninput="checkStrength(this.value)">
          <button type="button" class="toggle-pw" onclick="togglePw('signup-password', this)">👁</button>
        </div>
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="strength-label" id="strength-label"></span>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btn-signup">アカウントを作成</button>

      <div class="divider">または</div>
      <button type="button" class="btn-oauth" onclick="oauthLogin('google')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleで続ける
      </button>

      <p class="terms">登録することで<a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意したものとみなします。</p>
    </form>

    <!-- LOGIN FORM -->
    <form id="form-login" style="display:none" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <div class="password-wrap">
          <input type="password" id="login-password" placeholder="パスワード" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)">👁</button>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:1rem">
        <a href="#" onclick="handleReset(event)" style="font-size:12px;color:var(--accent2);text-decoration:none">パスワードを忘れた方</a>
      </div>
      <button type="submit" class="btn-submit" id="btn-login">ログイン</button>

      <div class="divider">または</div>
      <button type="button" class="btn-oauth" onclick="oauthLogin('google')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleで続ける
      </button>
    </form>
  </div>

  <!-- DASHBOARD (ログイン後) -->
  <div id="dashboard">
    <div class="plan-badge"><span class="plan-dot"></span>FREE PLAN</div>
    <div class="dash-greeting">おかえり、<span id="dash-name">ユーザー</span>さん 👋</div>
    <p class="dash-sub" id="dash-email-sub"></p>

    <div class="dash-cards">
      <div class="dash-card">
        <div class="dc-label">利用可能な機能</div>
        <div class="dc-val">50</div>
      </div>
      <div class="dash-card">
        <div class="dc-label">今月の節約時間</div>
        <div class="dc-val">0h</div>
      </div>
      <div class="dash-card">
        <div class="dc-label">プラン</div>
        <div class="dc-val" style="font-size:18px;padding-top:4px">Free</div>
      </div>
    </div>

    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">おすすめ機能</p>
    <div class="feat-preview">
      <div class="feat-row"><span>📄</span><span>自動要約機</span></div>
      <div class="feat-row"><span>🗺️</span><span>最適ルートマップ</span></div>
      <div class="feat-row"><span>💳</span><span>サブスク見直し助手</span></div>
      <div class="feat-row"><span>🍱</span><span>料理レシピ検索</span></div>
    </div>
  </div>
</main>

<footer>© 2025 LifeOS Platform — <a href="#" style="color:var(--accent2);text-decoration:none">プライバシーポリシー</a></footer>

<script>
// ============================================================
// ⚠️  ここに自分のSupabaseプロジェクト情報を入れてください
// ============================================================
const SUPABASE_URL = 'https://gbgxqcmtyldpyqrkgxgu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_hwcJ2_kq_Ob1wIGV4rlUKg_FgDdbKKr';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── タブ切り替え ──
function switchTab(tab) {
  document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('form-login').style.display  = tab === 'login'  ? '' : 'none';
  document.getElementById('tab-signup').className = 'tab-btn' + (tab === 'signup' ? ' active' : '');
  document.getElementById('tab-login').className  = 'tab-btn' + (tab === 'login'  ? ' active' : '');
  clearAlerts();
}

// ── アラート ──
function showAlert(type, msg) {
  clearAlerts();
  const el = document.getElementById('alert-' + type);
  el.textContent = msg;
  el.classList.add('show');
}
function clearAlerts() {
  ['alert-error','alert-success'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('show');
    el.textContent = '';
  });
}

// ── パスワード表示切り替え ──
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// ── パスワード強度チェック ──
function checkStrength(val) {
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (val.length >= 8)  score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w: '0%',   bg: 'transparent', text: '' },
    { w: '25%',  bg: '#e24b4a',     text: '弱い' },
    { w: '50%',  bg: '#EF9F27',     text: 'まあまあ' },
    { w: '75%',  bg: '#1D9E75',     text: '強い' },
    { w: '100%', bg: '#5DCAA5',     text: 'とても強い' },
  ];
  const l = levels[score];
  fill.style.width      = l.w;
  fill.style.background = l.bg;
  label.textContent     = l.text;
  label.style.color     = l.bg;
}

// ── ボタンのローディング状態 ──
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span>処理中...'
    : (btnId === 'btn-signup' ? 'アカウントを作成' : 'ログイン');
}

// ── 新規登録 ──
async function handleSignup(e) {
  e.preventDefault();
  clearAlerts();
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-password').value;

  if (pass.length < 8) { showAlert('error', 'パスワードは8文字以上で入力してください'); return; }

  setLoading('btn-signup', true);
  const { data, error } = await sb.auth.signUp({
    email,
    password: pass,
    options: { data: { display_name: name || email.split('@')[0] } }
  });
  setLoading('btn-signup', false);

  if (error) {
    const msg = {
      'User already registered': 'このメールアドレスはすでに登録されています',
      'Password should be at least 6 characters': 'パスワードは6文字以上で入力してください',
    }[error.message] || error.message;
    showAlert('error', msg);
  } else if (data.user?.identities?.length === 0) {
    showAlert('error', 'このメールアドレスはすでに登録されています');
  } else {
    showAlert('success', '✅ 確認メールを送りました。メールボックスをご確認ください。');
  }
}

// ── ログイン ──
async function handleLogin(e) {
  e.preventDefault();
  clearAlerts();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;

  setLoading('btn-login', true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoading('btn-login', false);

  if (error) {
    const msg = {
      'Invalid login credentials': 'メールアドレスまたはパスワードが正しくありません',
      'Email not confirmed': 'メールアドレスの確認が完了していません。確認メールをご確認ください',
    }[error.message] || error.message;
    showAlert('error', msg);
  } else {
    showDashboard(data.user);
  }
}

// ── Google OAuth ──
async function oauthLogin(provider) {
  const { error } = await sb.auth.signInWithOAuth({
    provider,
    options: { redirectTo: window.location.href }
  });
  if (error) showAlert('error', error.message);
}

// ── パスワードリセット ──
async function handleReset(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showAlert('error', 'メールアドレスを入力してから押してください'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.href
  });
  if (error) showAlert('error', error.message);
  else showAlert('success', 'パスワードリセットのメールを送りました');
}

// ── ログアウト ──
async function logout() {
  await sb.auth.signOut();
  showAuthCard();
}

// ── UI 切り替え ──
function showDashboard(user) {
  const name = user.user_metadata?.display_name || user.email.split('@')[0];
  document.getElementById('dash-name').textContent = name;
  document.getElementById('dash-email-sub').textContent = user.email + ' でログイン中';
  document.getElementById('nav-avatar').textContent = name[0].toUpperCase();
  document.getElementById('nav-email').textContent = user.email;
  document.getElementById('nav-user').style.display = 'flex';
  document.getElementById('auth-card').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function showAuthCard() {
  document.getElementById('nav-user').style.display = 'none';
  document.getElementById('auth-card').style.display = '';
  document.getElementById('dashboard').style.display = 'none';
  clearAlerts();
}

// ── セッション復元 ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showDashboard(session.user);

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) showDashboard(session.user);
    if (event === 'SIGNED_OUT') showAuthCard();
  });
})();
</script>
